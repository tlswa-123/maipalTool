<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>脉大夫 - 中医问诊</title>
  <style>
    :root {
      --bg-primary: #faf8f5;
      --bg-secondary: #f5f0e8;
      --bg-tertiary: #ede8de;
      --text-primary: #3d3229;
      --text-secondary: #5c5043;
      --text-muted: #8b7d6b;
      --accent: #8b4513;
      --accent-light: #a0522d;
      --border: #d4c8b8;
      --user-msg-bg: #e8e0d5;
      --ai-msg-bg: #ffffff;
      --shadow: 0 2px 8px rgba(61, 50, 41, 0.08);
      --shadow-hover: 0 4px 16px rgba(61, 50, 41, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      box-shadow: var(--shadow);
    }

    .header-title-wrap { display: flex; flex-direction: column; }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    .header-sub {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .model-select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      outline: none;
    }

    .model-select:focus { border-color: var(--accent); }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .icon-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--accent);
    }

    /* Chat Container */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .messages-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Welcome Screen */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .welcome-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.8;
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto;
    }

    /* Message Styles */
    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #6b8e6b 0%, #8fbc8f 100%);
    }

    .message-content {
      max-width: calc(100% - 60px);
      padding: 14px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.7;
      box-shadow: var(--shadow);
    }

    .message.ai .message-content {
      background: var(--ai-msg-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.user .message-content {
      background: var(--user-msg-bg);
      color: var(--text-primary);
      border-bottom-right-radius: 4px;
    }

    .message-content p { margin-bottom: 10px; }
    .message-content p:last-child { margin-bottom: 0; }

    /* Markdown Styles */
    .message-content pre {
      background: #f5f2ed;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
      margin: 10px 0;
    }

    .message-content code {
      background: #f5f2ed;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
    }

    .message-content pre code { background: none; padding: 0; }

    .message-content strong { color: var(--accent); font-weight: 600; }

    .message-content em { color: var(--text-secondary); font-style: italic; }

    /* Input Area */
    .input-area {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-box {
      flex: 1;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      outline: none;
      min-height: 52px;
      max-height: 200px;
      font-family: inherit;
      color: var(--text-primary);
    }

    .input-box:focus { border-color: var(--accent); }

    .input-box::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--shadow-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Loading Indicator */
    .loading {
      display: flex;
      gap: 4px;
      padding: 12px 0;
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Responsive */
    @media (max-width: 640px) {
      .header { padding: 10px 16px; }
      .header-title { font-size: 16px; }
      .chat-container { padding: 12px; }
      .message-content { max-width: calc(100% - 50px); font-size: 14px; }
      .input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="header-logo">🧑‍⚕️</div>
      <div class="header-title-wrap">
        <div class="header-title">脉大夫</div>
        <div class="header-sub">
          <span class="status-dot"></span>
          <span id="statusText">资深中医师</span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <select class="model-select" id="modelSelect">
        <option value="claude-sonnet-4.6-1m">Claude Sonnet 4.6 (1M)</option>
        <option value="claude-opus-4.6-1m">Claude Opus 4.6 (1M)</option>
        <option value="claude-opus-4.6">Claude Opus 4.6</option>
        <option value="claude-opus-4.5">Claude Opus 4.5</option>
        <option value="gpt-5.4">GPT-5.4</option>
        <option value="gpt-5.2">GPT-5.2</option>
        <option value="gemini-3.0-pro">Gemini 3.0 Pro</option>
        <option value="gemini-3.0-flash">Gemini 3.0 Flash</option>
        <option value="deepseek-v3-2-volc-ioa">DeepSeek V3</option>
        <option value="hunyuan-2.0-thinking-ioa">混元 Thinking</option>
        <option value="kimi-k2.5-ioa">Kimi K2.5</option>
        <option value="glm-5.0-ioa">GLM 5.0</option>
        <option value="minimax-m2.7-ioa">MiniMax M2.7</option>
      </select>
      <button class="icon-btn" id="clearBtn" title="新问诊">🔄</button>
      <button class="icon-btn" id="exportBtn" title="导出记录">📋</button>
    </div>
  </header>

  <!-- Chat Container -->
  <main class="chat-container" id="chatContainer">
    <div class="messages-wrapper" id="messagesWrapper">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🌿</div>
        <h2>脉大夫中医问诊</h2>
        <p>欢迎来找脉大夫聊聊。不管是身体哪里不舒服，还是想聊聊养生调理，都可以跟我说。</p>
      </div>
    </div>
  </main>

  <!-- Input Area -->
  <footer class="input-area">
    <div class="input-wrapper">
      <textarea
        class="input-box"
        id="userInput"
        placeholder="输入消息..."
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </footer>

  <script>
    // ============ State ============
    let messages = []; // [{role, content}]
    let isStreaming = false;
    let abortController = null;
    let personaLoaded = false;

    const chatContainer = document.getElementById('chatContainer');
    const messagesWrapper = document.getElementById('messagesWrapper');
    const welcomeScreen = document.getElementById('welcomeScreen');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusText = document.getElementById('statusText');
    const modelSelect = document.getElementById('modelSelect');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');

    // ============ Load Opening Message on startup ============
    async function loadOpening() {
      try {
        const res = await fetch('/api/opening');
        const data = await res.json();
        if (data.opening) {
          personaLoaded = true;
          statusText.textContent = `${data.persona} · 已就绪`;
          // 自动显示开场白
          setTimeout(() => {
            addMessage('ai', data.opening);
          }, 500);
        }
      } catch (e) {
        statusText.textContent = '脉大夫 · 加载失败';
      }
    }

    // ============ Auto-resize textarea ============
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
    });

    // ============ Send Message ============
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text || isStreaming) return;

      // Hide welcome screen
      welcomeScreen.style.display = 'none';

      // Add user message
      addMessage('user', text);
      messages.push({ role: 'user', content: text });

      // Clear input
      userInput.value = '';
      userInput.style.height = 'auto';

      // Show loading
      const loadingId = showLoading();

      // Stream response
      isStreaming = true;
      sendBtn.disabled = true;

      try {
        abortController = new AbortController();
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: modelSelect.value,
            messages: messages
          }),
          signal: abortController.signal
        });

        removeLoading(loadingId);
        const messageId = addMessage('ai', '');
        const contentEl = document.querySelector(`[data-id="${messageId}"] .message-content`);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                const parsed = JSON.parse(data);
                if (parsed.content) {
                  fullContent += parsed.content;
                  contentEl.innerHTML = renderMarkdown(fullContent);
                  scrollToBottom();
                }
              } catch (e) {}
            }
          }
        }

        messages.push({ role: 'assistant', content: fullContent });

      } catch (err) {
        if (err.name !== 'AbortError') {
          removeLoading(loadingId);
          addMessage('ai', '抱歉，出错了：' + err.message);
        }
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        abortController = null;
      }
    }

    // ============ UI Helpers ============
    function addMessage(role, content) {
      const id = 'msg-' + Date.now();
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.dataset.id = id;
      div.innerHTML = `
        <div class="avatar">${role === 'ai' ? '🧑‍⚕️' : '🙋'}</div>
        <div class="message-content">${content ? renderMarkdown(content) : ''}</div>
      `;
      messagesWrapper.appendChild(div);
      scrollToBottom();
      return id;
    }

    function showLoading() {
      const id = 'loading-' + Date.now();
      const div = document.createElement('div');
      div.className = 'message ai';
      div.dataset.loadingId = id;
      div.innerHTML = `
        <div class="avatar">🧑‍⚕️</div>
        <div class="message-content">
          <div class="loading">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
          </div>
        </div>
      `;
      messagesWrapper.appendChild(div);
      scrollToBottom();
      return id;
    }

    function removeLoading(id) {
      const el = document.querySelector(`[data-loading-id="${id}"]`);
      if (el) el.remove();
    }

    function scrollToBottom() {
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n/g, '<br>');
    }

    // ============ Event Listeners ============
    sendBtn.addEventListener('click', sendMessage);

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    clearBtn.addEventListener('click', () => {
      if (confirm('确定要开始新的问诊吗？当前对话将被清空。')) {
        messages = [];
        messagesWrapper.innerHTML = `
          <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">🌿</div>
            <h2>脉大夫中医问诊</h2>
            <p>欢迎来找脉大夫聊聊。不管是身体哪里不舒服，还是想聊聊养生调理，都可以跟我说。</p>
          </div>
        `;
        // 重新加载开场白
        setTimeout(() => {
          loadOpening();
        }, 300);
      }
    });

    exportBtn.addEventListener('click', () => {
      if (messages.length === 0) {
        alert('还没有对话记录');
        return;
      }
      let md = '# 脉大夫问诊记录\n\n';
      md += `**时间**: ${new Date().toLocaleString()}\n\n`;
      md += '---\n\n';
      for (const msg of messages) {
        if (msg.role === 'user') {
          md += `**患者**: ${msg.content}\n\n`;
        } else {
          md += `**脉大夫**: ${msg.content}\n\n`;
        }
      }
      const blob = new Blob([md], { type: 'text/markdown' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `脉大夫问诊记录-${new Date().toISOString().slice(0, 10)}.md`;
      a.click();
      URL.revokeObjectURL(url);
    });

    // ============ Init ============
    loadOpening();
  </script>
</body>
</html>
