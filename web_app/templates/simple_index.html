<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 语音助手 - 在线测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }

        .panel {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .panel-header h2 {
            color: #333;
            font-size: 1.5em;
        }

        .panel-header .icon {
            font-size: 2em;
            margin-right: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-left: auto;
        }

        .status-idle {
            background: #6c757d;
            color: white;
        }

        .status-active {
            background: #28a745;
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 1em;
            resize: vertical;
            margin-bottom: 15px;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }

        .btn-success:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
        }

        .btn-info:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(23, 162, 184, 0.4);
        }

        .output-box {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            margin-top: 15px;
            font-size: 1em;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .output-box.empty {
            color: #6c757d;
            font-style: italic;
        }

        .live-text {
            color: #28a745;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .settings-panel {
            grid-column: 1 / -1;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item label {
            font-weight: bold;
            color: #333;
        }

        .setting-item select,
        .setting-item input {
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1em;
        }

        .setting-item select:focus,
        .setting-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        .log-box {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px 10px;
            border-radius: 5px;
            background: white;
        }

        .log-entry.info {
            border-left: 3px solid #17a2b8;
        }

        .log-entry.success {
            border-left: 3px solid #28a745;
        }

        .log-entry.error {
            border-left: 3px solid #dc3545;
            background: #f8d7da;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ AI 语音助手 - 在线测试</h1>
            <p>使用浏览器原生 API 进行语音识别、AI 对话和语音合成</p>
        </div>

        <div class="main-content">
            <!-- 用户输入面板 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="icon">👤</span>
                    <h2>用户输入</h2>
                    <span class="status-badge status-idle" id="userStatus">空闲</span>
                </div>

                <textarea id="userInput" placeholder="在这里输入文字，或点击"开始录音"进行语音识别..."></textarea>

                <div class="button-group">
                    <button class="btn-success" id="btnRecord" onclick="toggleRecording()">
                        <span id="recordIcon">🎤</span>
                        <span id="recordText">开始录音</span>
                    </button>
                    <button class="btn-primary" onclick="sendUserInput()">
                        <span>📤</span>
                        <span>发送给 AI</span>
                    </button>
                    <button class="btn-info" onclick="clearUserInput()">
                        <span>🗑️</span>
                        <span>清空</span>
                    </button>
                </div>

                <div class="output-box empty" id="userOutput">
                    等待输入...
                </div>

                <div style="margin-top: 15px; color: #6c757d; font-size: 0.9em;">
                    💡 提示：点击"开始录音"后，对着麦克风说话，识别会实时显示在上方
                </div>
            </div>

            <!-- AI 回复面板 -->
            <div class="panel">
                <div class="panel-header">
                    <span class="icon">🤖</span>
                    <h2>AI 回复</h2>
                    <span class="status-badge status-idle" id="aiStatus">空闲</span>
                </div>

                <div class="output-box empty" id="aiOutput">
                    AI 的回复将显示在这里...
                </div>

                <div class="button-group" style="margin-top: 15px;">
                    <button class="btn-success" id="btnPlayAI" onclick="playAIResponse()" disabled>
                        <span>🔊</span>
                        <span>播放语音</span>
                    </button>
                    <button class="btn-danger" id="btnStopAI" onclick="stopAIResponse()" disabled>
                        <span>⏹️</span>
                        <span>停止播放</span>
                    </button>
                    <button class="btn-info" onclick="clearAIOutput()">
                        <span>🗑️</span>
                        <span>清空</span>
                    </button>
                </div>
            </div>

            <!-- 设置面板 -->
            <div class="settings-panel">
                <div class="panel-header">
                    <span class="icon">⚙️</span>
                    <h2>设置</h2>
                </div>

                <div class="settings-grid">
                    <div class="setting-item">
                        <label for="aiProvider">AI 服务提供商</label>
                        <select id="aiProvider" onchange="updateAIModel()">
                            <option value="codebuddy">CodeBuddy (腾讯云知识引擎) - 已配置</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <label for="aiModel">AI 模型</label>
                        <select id="aiModel">
                            <option value="tc-code-latest" selected>Auto (智能路由 - 推荐)</option>
                            <option value="hunyuan-2.0-instruct">腾讯混元 2.0</option>
                            <option value="hunyuan-2.0-thinking">腾讯混元 2.0 Think</option>
                            <option value="hunyuan-t1">Hunyuan-T1</option>
                            <option value="hunyuan-turbos">Hunyuan-TurboS</option>
                            <option value="minimax-m2.5">MiniMax-M2.5</option>
                            <option value="kimi-k2.5">Kimi-K2.5</option>
                            <option value="glm-5">GLM-5</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <label for="apiKey">API Key</label>
                        <input type="password" id="apiKey" placeholder="WorkBuddy API 已预配置" value="已配置" readonly style="background-color: #e8f5e9;">
                    </div>

                    <div class="setting-item">
                        <label for="ttsEngine">语音合成引擎</label>
                        <select id="ttsEngine">
                            <option value="edge">Edge TTS (在线，推荐)</option>
                            <option value="pyttsx3">pyttsx3 (离线)</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <label for="ttsVoice">TTS 语音 (默认老年男声)</label>
                        <select id="ttsVoice">
                            <option value="zh-CN-YunjianNeural" selected>👴 云健 - 老年男声 (沉稳)</option>
                            <option value="zh-CN-YunxiNeural">👨 云希 - 中年男声 (专业)</option>
                            <option value="zh-CN-YunyangNeural">👨 云扬 - 中年男声 (活泼)</option>
                            <option value="zh-CN-XiaoxiaoNeural">👩 晓晓 - 女声 (温柔)</option>
                            <option value="zh-CN-XiaoyiNeural">👩 晓伊 - 女声 (可爱)</option>
                            <option value="zh-CN-XiaohanNeural">👩 晓涵 - 女声 (成熟)</option>
                        </select>
                    </div>

                    <div class="setting-item">
                        <label for="systemPrompt">系统提示词</label>
                        <input type="text" id="systemPrompt"
                               placeholder="你是一个友好、乐于助人的AI助手。"
                               value="你是一个友好、乐于助人的AI助手。">
                    </div>

                    <div class="setting-item">
                        <label>&nbsp;</label>
                        <button class="btn-primary" onclick="saveSettings()">
                            <span>💾</span>
                            <span>保存设置</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 日志面板 -->
            <div class="panel" style="grid-column: 1 / -1;">
                <div class="panel-header">
                    <span class="icon">📋</span>
                    <h2>操作日志</h2>
                    <button class="btn-info" style="margin-left: auto;" onclick="clearLogs()">
                        <span>🗑️</span>
                        <span>清空日志</span>
                    </button>
                </div>

                <div class="log-box" id="logBox">
                    <div class="log-entry info">
                        <strong>系统</strong>: 欢迎使用 AI 语音助手在线测试平台！
                    </div>
                    <div class="log-entry info">
                        <strong>提示</strong>: 使用浏览器原生 Web Speech API 进行语音识别，无需额外安装依赖。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let recognition = null;
        let isRecording = false;
        let aiAudio = null;
        let currentAIResponse = '';

        // 添加日志
        function addLog(message, type = 'info') {
            const logBox = document.getElementById('logBox');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.innerHTML = `<strong>${timestamp}</strong>: ${message}`;
            logBox.appendChild(logEntry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('logBox').innerHTML = '';
            addLog('日志已清空');
        }

        // 更新状态
        function updateStatus(elementId, status, text) {
            const element = document.getElementById(elementId);
            element.className = `status-badge status-${status}`;
            element.textContent = text;
        }

        // 初始化语音识别
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                addLog('浏览器不支持语音识别，请使用 Chrome 或 Edge', 'error');
                return false;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                addLog('语音识别已启动', 'info');
                document.getElementById('userInput').disabled = true;
            };

            recognition.onresult = (event) => {
                let finalTranscript = '';
                let interimTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                // 显示识别结果
                const userInput = document.getElementById('userInput');
                if (finalTranscript) {
                    userInput.value = finalTranscript;
                    document.getElementById('userOutput').textContent = finalTranscript;
                    document.getElementById('userOutput').classList.remove('empty');
                    addLog(`识别完成: "${finalTranscript}"`, 'success');
                } else if (interimTranscript) {
                    // 实时显示正在识别的文字
                    userInput.value = interimTranscript;
                }
            };

            recognition.onerror = (event) => {
                addLog(`识别错误: ${event.error}`, 'error');
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) {
                    // 如果还在录音状态，重新启动
                    recognition.start();
                } else {
                    addLog('语音识别已停止', 'info');
                    document.getElementById('userInput').disabled = false;
                }
            };

            return true;
        }

        // 切换录音状态
        function toggleRecording() {
            if (!recognition) {
                if (!initSpeechRecognition()) {
                    return;
                }
            }

            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        // 开始录音
        function startRecording() {
            if (!recognition) {
                if (!initSpeechRecognition()) {
                    return;
                }
            }

            try {
                recognition.start();
                isRecording = true;

                // 更新 UI
                document.getElementById('btnRecord').innerHTML = '<span>⏹️</span><span>停止录音</span>';
                document.getElementById('btnRecord').classList.remove('btn-success');
                document.getElementById('btnRecord').classList.add('btn-danger');
                updateStatus('userStatus', 'active', '录音中...');
                addLog('开始录音...请说话', 'info');

            } catch (error) {
                addLog(`启动录音失败: ${error.message}`, 'error');
            }
        }

        // 停止录音
        function stopRecording() {
            if (recognition) {
                recognition.stop();
                isRecording = false;

                // 更新 UI
                document.getElementById('btnRecord').innerHTML = '<span>🎤</span><span>开始录音</span>';
                document.getElementById('btnRecord').classList.remove('btn-danger');
                document.getElementById('btnRecord').classList.add('btn-success');
                updateStatus('userStatus', 'idle', '已停止');
                addLog('录音已停止', 'info');
            }
        }

        // 发送用户输入给 AI
        async function sendUserInput() {
            const userInput = document.getElementById('userInput').value.trim();
            if (!userInput) {
                addLog('请输入文字或先进行语音识别', 'error');
                return;
            }

            try {
                updateStatus('aiStatus', 'active', '思考中...');
                addLog(`发送给 AI: "${userInput}"`, 'info');

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: userInput,
                        model: document.getElementById('aiModel').value,
                        system_prompt: document.getElementById('systemPrompt').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentAIResponse = data.response;
                    document.getElementById('aiOutput').textContent = currentAIResponse;
                    document.getElementById('aiOutput').classList.remove('empty');
                    document.getElementById('btnPlayAI').disabled = false;
                    updateStatus('aiStatus', 'idle', '回复完成');
                    addLog(`AI 回复: "${data.response}"`, 'success');
                } else {
                    updateStatus('aiStatus', 'idle', '失败');
                    addLog(`AI 回复失败: ${data.error}`, 'error');
                }

            } catch (error) {
                updateStatus('aiStatus', 'idle', '错误');
                addLog(`AI 请求失败: ${error.message}`, 'error');
            }
        }

        // 播放 AI 语音
        async function playAIResponse() {
            if (!currentAIResponse) return;

            try {
                updateStatus('aiStatus', 'active', '播放中...');
                document.getElementById('btnPlayAI').disabled = true;
                document.getElementById('btnStopAI').disabled = false;

                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: currentAIResponse,
                        engine: document.getElementById('ttsEngine').value,
                        voice: document.getElementById('ttsVoice').value
                    })
                });

                const data = await response.json();

                if (data.success && data.audio_url) {
                    // 播放音频
                    aiAudio = new Audio(data.audio_url);
                    aiAudio.onended = () => {
                        updateStatus('aiStatus', 'idle', '播放完成');
                        document.getElementById('btnPlayAI').disabled = false;
                        document.getElementById('btnStopAI').disabled = true;
                        addLog('语音播放完成', 'success');
                    };
                    aiAudio.play();
                    addLog('正在播放 AI 语音...', 'info');
                } else {
                    updateStatus('aiStatus', 'idle', '失败');
                    addLog(`语音合成失败: ${data.error}`, 'error');
                    document.getElementById('btnPlayAI').disabled = false;
                    document.getElementById('btnStopAI').disabled = true;
                }

            } catch (error) {
                updateStatus('aiStatus', 'idle', '错误');
                addLog(`语音播放失败: ${error.message}`, 'error');
                document.getElementById('btnPlayAI').disabled = false;
                document.getElementById('btnStopAI').disabled = true;
            }
        }

        // 停止 AI 语音
        function stopAIResponse() {
            if (aiAudio) {
                aiAudio.pause();
                aiAudio.currentTime = 0;
                updateStatus('aiStatus', 'idle', '已停止');
                document.getElementById('btnPlayAI').disabled = false;
                document.getElementById('btnStopAI').disabled = true;
                addLog('语音播放已停止', 'info');
            }
        }

        // 清空用户输入
        function clearUserInput() {
            document.getElementById('userInput').value = '';
            document.getElementById('userOutput').textContent = '等待输入...';
            document.getElementById('userOutput').classList.add('empty');
            addLog('用户输入已清空', 'info');
        }

        // 清空 AI 输出
        function clearAIOutput() {
            document.getElementById('aiOutput').textContent = 'AI 的回复将显示在这里...';
            document.getElementById('aiOutput').classList.add('empty');
            document.getElementById('btnPlayAI').disabled = true;
            currentAIResponse = '';
            addLog('AI 回复已清空', 'info');
        }

        // 更新 AI 模型选项
        function updateAIModel() {
            // 只支持 WorkBuddy，无需切换
            const apiKeyInput = document.getElementById('apiKey');
            apiKeyInput.value = '已配置';
            apiKeyInput.readOnly = true;
            apiKeyInput.style.backgroundColor = '#e8f5e9';
        }

        // 保存设置
        function saveSettings() {
            const settings = {
                ai_provider: document.getElementById('aiProvider').value,
                ai_model: document.getElementById('aiModel').value,
                api_key: document.getElementById('apiKey').value,
                tts_engine: document.getElementById('ttsEngine').value,
                tts_voice: document.getElementById('ttsVoice').value,
                system_prompt: document.getElementById('systemPrompt').value
            };

            localStorage.setItem('voiceAssistantSettings', JSON.stringify(settings));
            addLog('设置已保存', 'success');
        }

        // 加载设置
        function loadSettings() {
            const savedSettings = localStorage.getItem('voiceAssistantSettings');
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                document.getElementById('aiProvider').value = settings.ai_provider || 'openai';
                updateAIModel();
                document.getElementById('aiModel').value = settings.ai_model || 'tc-code-latest';
                document.getElementById('apiKey').value = settings.api_key || '';
                document.getElementById('ttsEngine').value = settings.tts_engine || 'edge';
                document.getElementById('ttsVoice').value = settings.tts_voice || 'zh-CN-XiaoxiaoNeural';
                document.getElementById('systemPrompt').value = settings.system_prompt || '你是一个友好、乐于助人的AI助手。';
                addLog('设置已加载', 'info');
            }
        }

        // 页面加载时初始化
        window.onload = function() {
            loadSettings();
            addLog('系统初始化完成', 'success');

            // 检查浏览器支持
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                addLog('警告：您的浏览器不支持语音识别', 'error');
                addLog('建议使用 Chrome 或 Edge 浏览器', 'error');
            } else {
                addLog('语音识别功能可用', 'success');
            }
        };
    </script>
</body>
</html>
